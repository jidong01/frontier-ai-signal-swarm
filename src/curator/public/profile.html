<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curator Workspace — 페르소나</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── Profile page specific styles ── */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 680px) {
      .profile-grid { grid-template-columns: 1fr; }
    }
    .profile-card {
      background: var(--card-bg, #f5f3ef);
      border: 1px solid var(--border, #e5e2db);
      border-radius: 10px;
      padding: 1.25rem 1.4rem;
    }
    .profile-card.full-width {
      grid-column: 1 / -1;
    }
    .profile-card-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--secondary, #6b7280);
      margin-bottom: 1rem;
    }
    .profile-field {
      margin-bottom: 0.9rem;
    }
    .profile-field:last-child {
      margin-bottom: 0;
    }
    .profile-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--secondary, #6b7280);
      margin-bottom: 0.3rem;
    }
    .profile-input {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--border, #e5e2db);
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: inherit;
      background: var(--bg, #fafaf8);
      color: var(--text, #1a1a1a);
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    .profile-input:focus {
      outline: none;
      border-color: var(--accent, #c45d2c);
    }
    .profile-textarea {
      min-height: 70px;
      resize: vertical;
    }
    /* Domain sliders */
    .domain-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }
    .domain-row:last-child { margin-bottom: 0; }
    .domain-name {
      font-size: 0.78rem;
      font-family: 'Courier New', monospace;
      width: 120px;
      flex-shrink: 0;
      color: var(--text, #1a1a1a);
    }
    .domain-slider {
      flex: 1;
      appearance: none;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--border, #e5e2db);
      outline: none;
      cursor: pointer;
    }
    .domain-slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent, #c45d2c);
      cursor: pointer;
    }
    .domain-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent, #c45d2c);
      cursor: pointer;
      border: none;
    }
    .domain-value {
      font-size: 0.78rem;
      font-family: 'Courier New', monospace;
      width: 28px;
      text-align: right;
      color: var(--secondary, #6b7280);
      flex-shrink: 0;
    }
    /* Tag list editor */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }
    .tag-item {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.22rem 0.55rem;
      background: var(--bg, #fafaf8);
      border: 1px solid var(--border, #e5e2db);
      border-radius: 20px;
      font-size: 0.78rem;
      color: var(--text, #1a1a1a);
    }
    .tag-item.likes { border-color: #6ee7b7; color: #065f46; background: #f0fdf4; }
    .tag-item.dislikes { border-color: #fca5a5; color: #991b1b; background: #fef2f2; }
    .tag-remove {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--secondary, #6b7280);
      padding: 0;
      line-height: 1;
    }
    .tag-remove:hover { color: var(--accent, #c45d2c); }
    .tag-add-row {
      display: flex;
      gap: 0.4rem;
    }
    .tag-add-input {
      flex: 1;
      padding: 0.35rem 0.55rem;
      border: 1px solid var(--border, #e5e2db);
      border-radius: 6px;
      font-size: 0.8rem;
      font-family: inherit;
      background: var(--bg, #fafaf8);
      color: var(--text, #1a1a1a);
    }
    .tag-add-input:focus { outline: none; border-color: var(--accent, #c45d2c); }
    .tag-add-btn {
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border, #e5e2db);
      border-radius: 6px;
      background: var(--bg, #fafaf8);
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--secondary, #6b7280);
      transition: border-color 0.15s, color 0.15s;
    }
    .tag-add-btn:hover { border-color: var(--accent, #c45d2c); color: var(--accent, #c45d2c); }
    /* Preference selects */
    .pref-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }
    .pref-group {
      flex: 1;
    }
    .pref-select {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--border, #e5e2db);
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: inherit;
      background: var(--bg, #fafaf8);
      color: var(--text, #1a1a1a);
      cursor: pointer;
    }
    .pref-select:focus { outline: none; border-color: var(--accent, #c45d2c); }
    /* Save bar */
    .save-bar {
      position: sticky;
      bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg, #fafaf8);
      border: 1px solid var(--border, #e5e2db);
      border-radius: 10px;
      padding: 0.75rem 1.2rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      margin-top: 1.5rem;
    }
    .save-status {
      font-size: 0.8rem;
      color: var(--secondary, #6b7280);
    }
    .save-status.dirty { color: #d97706; }
    .save-status.saved { color: #059669; }
    .btn-save {
      padding: 0.5rem 1.4rem;
      background: var(--accent, #c45d2c);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
    /* last-updated badge */
    .last-updated {
      font-size: 0.72rem;
      color: var(--secondary, #6b7280);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Navigation -->
    <nav class="nav">
      <div class="nav-brand">Curator <span>Workspace</span></div>
      <div class="nav-links">
        <a href="/" class="nav-link">피드</a>
        <a href="/dossiers.html" class="nav-link">도시에</a>
        <a href="/memos.html" class="nav-link">메모</a>
        <a href="/sources.html" class="nav-link">소스</a>
        <a href="/profile.html" class="nav-link active">페르소나</a>
      </div>
      <div class="nav-stats" id="nav-stats"></div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title">페르소나</h1>
      <p class="page-subtitle">AI가 학습한 나의 선호도 — 직접 확인하고 수정</p>
    </div>

    <div id="last-updated" class="last-updated">불러오는 중...</div>

    <div id="profile-editor" style="display:none">

      <!-- Row 1: 기본 정보 + 분석 선호도 -->
      <div class="profile-grid">

        <!-- 기본 정보 -->
        <div class="profile-card">
          <div class="profile-card-title">기본 정보</div>
          <div class="profile-field">
            <label class="profile-label" for="p-name">이름</label>
            <input type="text" id="p-name" class="profile-input" autocomplete="off">
          </div>
          <div class="profile-field">
            <label class="profile-label" for="p-role">역할</label>
            <input type="text" id="p-role" class="profile-input" autocomplete="off">
          </div>
          <div class="profile-field">
            <label class="profile-label" for="p-focus">포커스</label>
            <textarea id="p-focus" class="profile-input profile-textarea"></textarea>
          </div>
          <div class="profile-field">
            <label class="profile-label" for="p-lens">렌즈 (분석 관점)</label>
            <textarea id="p-lens" class="profile-input profile-textarea"></textarea>
          </div>
        </div>

        <!-- 분석 선호도 -->
        <div class="profile-card">
          <div class="profile-card-title">분석 선호도</div>

          <div class="pref-row">
            <div class="pref-group">
              <label class="profile-label" for="p-depth">분석 깊이</label>
              <select id="p-depth" class="pref-select">
                <option value="shallow">얕게 (빠른 요약)</option>
                <option value="balanced">균형</option>
                <option value="deep">깊게 (심층 분석)</option>
              </select>
            </div>
            <div class="pref-group">
              <label class="profile-label" for="p-hype">과대포장 민감도</label>
              <select id="p-hype" class="pref-select">
                <option value="low">낮음 (호들갑 수용)</option>
                <option value="medium">중간</option>
                <option value="high">높음 (엄격 필터)</option>
              </select>
            </div>
          </div>

          <div class="profile-field">
            <label class="profile-label">핵심 질문</label>
            <div class="tag-list" id="key-questions-list"></div>
            <div class="tag-add-row">
              <input type="text" class="tag-add-input" id="kq-input" placeholder="질문 추가..." autocomplete="off">
              <button class="tag-add-btn" onclick="addTag('key_questions', 'kq-input')">추가</button>
            </div>
          </div>

          <div class="profile-field">
            <label class="profile-label">관심 영역</label>
            <div class="tag-list" id="focus-areas-list"></div>
            <div class="tag-add-row">
              <input type="text" class="tag-add-input" id="fa-input" placeholder="영역 추가..." autocomplete="off">
              <button class="tag-add-btn" onclick="addTag('focus_areas', 'fa-input')">추가</button>
            </div>
          </div>
        </div>

      </div>

      <!-- Row 2: 도메인 가중치 (full width) -->
      <div class="profile-grid">
        <div class="profile-card full-width">
          <div class="profile-card-title">도메인 가중치 — 시그널 선택 우선순위 (0 = 무시, 1 = 최우선)</div>
          <div id="domain-sliders"></div>
        </div>
      </div>

      <!-- Row 3: 학습된 선호 (likes + dislikes) -->
      <div class="profile-grid">

        <div class="profile-card">
          <div class="profile-card-title">선호 패턴 (분석이 이래야 해)</div>
          <div class="tag-list" id="likes-list"></div>
          <div class="tag-add-row">
            <input type="text" class="tag-add-input" id="likes-input" placeholder="선호 추가..." autocomplete="off">
            <button class="tag-add-btn" onclick="addTag('likes', 'likes-input')">추가</button>
          </div>
        </div>

        <div class="profile-card">
          <div class="profile-card-title">비선호 패턴 (이것만은 피해줘)</div>
          <div class="tag-list" id="dislikes-list"></div>
          <div class="tag-add-row">
            <input type="text" class="tag-add-input" id="dislikes-input" placeholder="비선호 추가..." autocomplete="off">
            <button class="tag-add-btn" onclick="addTag('dislikes', 'dislikes-input')">추가</button>
          </div>
        </div>

      </div>

    </div><!-- /profile-editor -->

    <!-- Loading state -->
    <div id="profile-loading" class="loading">
      <div class="loading-spinner"></div>
      <div>프로필 불러오는 중...</div>
    </div>

    <!-- Save bar -->
    <div class="save-bar" id="save-bar" style="display:none">
      <span class="save-status" id="save-status">변경 없음</span>
      <button class="btn-save" id="save-btn" onclick="saveProfile()" disabled>저장</button>
    </div>

  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/app.js"></script>
  <script>
    // ── Profile page state ──
    let profileData = null;
    let isDirty = false;

    const DOMAIN_LABELS = {
      architecture: '아키텍처',
      agent_engineering: '에이전트 엔지니어링',
      infrastructure: '인프라',
      research: '연구',
      opensource: '오픈소스',
      product: '제품',
      ecosystem: '생태계',
      capital: '자본/투자',
      regulation: '규제/정책',
      talent: '인재/채용',
    };

    async function loadProfile() {
      try {
        const res = await fetch('/api/profile');
        profileData = await res.json();
        renderProfile(profileData);
        document.getElementById('profile-loading').style.display = 'none';
        document.getElementById('profile-editor').style.display = 'block';
        document.getElementById('save-bar').style.display = 'flex';
        const lu = profileData.last_updated
          ? `마지막 업데이트: ${new Date(profileData.last_updated).toLocaleString('ko-KR')}`
          : '';
        document.getElementById('last-updated').textContent = lu;
      } catch (e) {
        document.getElementById('profile-loading').innerHTML = '<div style="color:#ef4444">프로필 로드 실패</div>';
      }
    }

    function renderProfile(p) {
      // 기본 정보
      document.getElementById('p-name').value = p.name || '';
      document.getElementById('p-role').value = p.context?.role || '';
      document.getElementById('p-focus').value = p.context?.focus || '';
      document.getElementById('p-lens').value = p.context?.lens || '';

      // 분석 선호도
      document.getElementById('p-depth').value = p.interests?.depth_preference || 'deep';
      document.getElementById('p-hype').value = p.interests?.hype_sensitivity || 'high';

      // 핵심 질문
      renderTagList('key-questions-list', p.context?.key_questions || [], 'key_questions');
      // 관심 영역
      renderTagList('focus-areas-list', p.interests?.focus_areas || [], 'focus_areas');

      // 도메인 슬라이더
      renderDomainSliders(p.interests?.domains || {});

      // 학습된 선호
      renderTagList('likes-list', p.learned_patterns?.likes || [], 'likes');
      renderTagList('dislikes-list', p.learned_patterns?.dislikes || [], 'dislikes');

      // 변경 감지 리스너
      setupChangeListeners();
    }

    function renderTagList(containerId, items, listKey) {
      const container = document.getElementById(containerId);
      const tagClass = listKey === 'likes' ? 'likes' : listKey === 'dislikes' ? 'dislikes' : '';
      container.innerHTML = items.map((item, i) => `
        <span class="tag-item ${tagClass}">
          ${escapeHtml(item)}
          <button class="tag-remove" onclick="removeTag('${listKey}', ${i})" title="삭제">×</button>
        </span>
      `).join('');
    }

    function renderDomainSliders(domains) {
      const container = document.getElementById('domain-sliders');
      const domainOrder = ['architecture', 'agent_engineering', 'infrastructure', 'research', 'opensource', 'product', 'ecosystem', 'capital', 'regulation', 'talent'];
      container.innerHTML = domainOrder.map(key => {
        const val = domains[key] ?? 0.5;
        const displayVal = parseFloat(val).toFixed(1);
        return `
          <div class="domain-row">
            <span class="domain-name">${DOMAIN_LABELS[key] || key}</span>
            <input type="range" class="domain-slider" min="0" max="1" step="0.05"
              value="${val}" data-domain="${key}"
              oninput="updateDomainValue(this)">
            <span class="domain-value" id="dv-${key}">${displayVal}</span>
          </div>
        `;
      }).join('');
    }

    function updateDomainValue(slider) {
      const key = slider.dataset.domain;
      const val = parseFloat(slider.value).toFixed(1);
      document.getElementById(`dv-${key}`).textContent = val;
      markDirty();
    }

    function setupChangeListeners() {
      ['p-name', 'p-role', 'p-focus', 'p-lens', 'p-depth', 'p-hype'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', markDirty);
        document.getElementById(id)?.addEventListener('change', markDirty);
      });
    }

    function markDirty() {
      if (!isDirty) {
        isDirty = true;
        const statusEl = document.getElementById('save-status');
        statusEl.textContent = '저장되지 않은 변경사항 있음';
        statusEl.className = 'save-status dirty';
        document.getElementById('save-btn').disabled = false;
      }
    }

    function getListForKey(key) {
      if (key === 'key_questions') return profileData.context.key_questions;
      if (key === 'focus_areas') return profileData.interests.focus_areas;
      if (key === 'likes') return profileData.learned_patterns.likes;
      if (key === 'dislikes') return profileData.learned_patterns.dislikes;
      return [];
    }

    function getContainerForKey(key) {
      if (key === 'key_questions') return 'key-questions-list';
      if (key === 'focus_areas') return 'focus-areas-list';
      if (key === 'likes') return 'likes-list';
      if (key === 'dislikes') return 'dislikes-list';
      return null;
    }

    function removeTag(key, index) {
      const list = getListForKey(key);
      list.splice(index, 1);
      renderTagList(getContainerForKey(key), list, key);
      markDirty();
    }

    function addTag(key, inputId) {
      const input = document.getElementById(inputId);
      const value = input.value.trim();
      if (!value) return;
      const list = getListForKey(key);
      if (!list.includes(value)) {
        list.push(value);
        renderTagList(getContainerForKey(key), list, key);
        markDirty();
      }
      input.value = '';
      input.focus();
    }

    // Enter key support for tag inputs
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const id = e.target?.id;
      if (id === 'kq-input') addTag('key_questions', 'kq-input');
      else if (id === 'fa-input') addTag('focus_areas', 'fa-input');
      else if (id === 'likes-input') addTag('likes', 'likes-input');
      else if (id === 'dislikes-input') addTag('dislikes', 'dislikes-input');
    });

    function collectProfile() {
      // Collect domain slider values
      const domains = {};
      document.querySelectorAll('.domain-slider').forEach(slider => {
        domains[slider.dataset.domain] = parseFloat(slider.value);
      });

      return {
        name: document.getElementById('p-name').value.trim(),
        context: {
          ...profileData.context,
          role: document.getElementById('p-role').value.trim(),
          focus: document.getElementById('p-focus').value.trim(),
          lens: document.getElementById('p-lens').value.trim(),
          key_questions: profileData.context.key_questions,
        },
        interests: {
          ...profileData.interests,
          domains,
          depth_preference: document.getElementById('p-depth').value,
          hype_sensitivity: document.getElementById('p-hype').value,
          focus_areas: profileData.interests.focus_areas,
        },
        learned_patterns: {
          ...profileData.learned_patterns,
          likes: profileData.learned_patterns.likes,
          dislikes: profileData.learned_patterns.dislikes,
        },
      };
    }

    async function saveProfile() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = '저장 중...';

      try {
        const patch = collectProfile();
        const res = await fetch('/api/profile', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patch),
        });

        if (!res.ok) throw new Error(await res.text());

        profileData = await res.json();
        isDirty = false;
        const statusEl = document.getElementById('save-status');
        statusEl.textContent = '저장됨 ✓';
        statusEl.className = 'save-status saved';
        btn.textContent = '저장';

        document.getElementById('last-updated').textContent =
          `마지막 업데이트: ${new Date(profileData.last_updated).toLocaleString('ko-KR')}`;

        if (typeof showToast === 'function') showToast('페르소나가 저장됐습니다.', 'success');

        setTimeout(() => {
          if (!isDirty) {
            statusEl.textContent = '변경 없음';
            statusEl.className = 'save-status';
          }
        }, 3000);
      } catch (e) {
        btn.textContent = '저장';
        btn.disabled = false;
        if (typeof showToast === 'function') showToast('저장 실패: ' + e.message, 'error');
      }
    }

    // Bootstrap
    loadProfile();
  </script>
</body>
</html>
