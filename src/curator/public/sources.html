<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curator Workspace — 소스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">

    <!-- Navigation -->
    <nav class="nav">
      <div class="nav-brand">Curator <span>Workspace</span></div>
      <div class="nav-links">
        <a href="/" class="nav-link">피드</a>
        <a href="/dossiers.html" class="nav-link">도시에</a>
        <a href="/memos.html" class="nav-link">메모</a>
        <a href="/sources.html" class="nav-link active">소스</a>
      </div>
      <div class="nav-stats" id="nav-stats"></div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title">소스</h1>
      <p class="page-subtitle">AI가 수집하는 소스 목록 — 신뢰도와 활성 상태를 관리</p>
    </div>

    <!-- Add Source Form -->
    <div class="add-source-form" id="add-source-form">
      <div class="form-row">
        <div style="flex:1">
          <label class="form-label" for="source-name-input">이름</label>
          <input
            type="text"
            id="source-name-input"
            class="form-input"
            placeholder="Anthropic Blog"
            autocomplete="off"
          />
        </div>
        <div style="flex:1.5">
          <label class="form-label" for="source-pattern-input">URL 패턴</label>
          <input
            type="text"
            id="source-pattern-input"
            class="form-input"
            placeholder="site:anthropic.com/news"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>
      <div>
        <label class="form-label" for="source-note-input">큐레이터 메모 (선택)</label>
        <input
          type="text"
          id="source-note-input"
          class="form-input"
          placeholder="이 소스에 대한 짧은 평가 또는 주의사항..."
          autocomplete="off"
        />
      </div>
      <div class="form-footer">
        <button class="btn-primary" id="add-source-btn" onclick="addSource()" disabled>
          소스 추가
        </button>
      </div>
    </div>

    <!-- Source sections -->
    <div id="sources-container">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>소스 목록 불러오는 중...</div>
      </div>
    </div>

  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
