<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curator Workspace — 메모</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">

    <!-- Navigation -->
    <nav class="nav">
      <div class="nav-brand">Curator <span>Workspace</span></div>
      <div class="nav-links">
        <a href="/" class="nav-link">피드</a>
        <a href="/dossiers.html" class="nav-link">도시에</a>
        <a href="/memos.html" class="nav-link active">메모</a>
        <a href="/sources.html" class="nav-link">소스</a>
      </div>
      <div class="nav-stats" id="nav-stats"></div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title">메모</h1>
      <p class="page-subtitle">읽은 것에 대한 생각, 연결, 질문</p>
    </div>

    <!-- New Memo Area -->
    <div class="memo-input-area" id="memo-input-area">
      <textarea
        id="memo-textarea"
        placeholder="생각을 적어보세요... 마크다운 지원&#10;&#10;**굵게** _기울임_ `코드` [링크](url)&#10;- 목록 항목"
        rows="4"
      ></textarea>
      <div class="memo-input-footer">
        <span class="memo-input-hint">
          Ctrl+Enter로 저장 &middot; 마크다운 지원
        </span>
        <button class="btn-primary" id="save-memo-btn" onclick="addMemo()" disabled>
          메모 저장
        </button>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <input
        type="search"
        id="memo-search"
        class="search-input"
        placeholder="메모 검색..."
        autocomplete="off"
      />
    </div>

    <!-- Memo count -->
    <div class="memo-count" id="memo-count"></div>

    <!-- Timeline -->
    <div id="memo-timeline" class="memo-timeline">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>메모 불러오는 중...</div>
      </div>
    </div>

  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
